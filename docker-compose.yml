version: "3.8"

services:
  # ========================
  # MySQL Database
  # ========================
  mysql:
    image: mysql:8.0
    container_name: aigame-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: aigame_platform
      MYSQL_USER: aigame
      MYSQL_PASSWORD: aigame_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aigame-net

  # ========================
  # MinIO Object Storage
  # ========================
  minio:
    image: minio/minio:latest
    container_name: aigame-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aigame-net

  # ========================
  # MinIO Bucket Init (one-shot)
  # ========================
  minio-init:
    image: minio/mc:latest
    container_name: aigame-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/games;
      mc anonymous set download myminio/games;
      echo 'MinIO bucket initialized!';
      "
    networks:
      - aigame-net

  # ========================
  # FastAPI Backend
  # ========================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aigame-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MYSQL_HOST=mysql
      - MINIO_ENDPOINT=minio:9000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - aigame-net

  # ========================
  # Nuxt 3 Frontend
  # ========================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aigame-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - aigame-net

volumes:
  mysql_data:
  minio_data:

networks:
  aigame-net:
    driver: bridge
